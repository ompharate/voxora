name: Build & Push Docker Images

on:
  push:
    tags:
      - "v*"           # triggers on: git tag v0.9.0-beta && git push --tags
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.9.0-beta)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip leading 'v' from tag  →  v0.9.0-beta becomes 0.9.0-beta
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── API ──────────────────────────────────────────────────────────────
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-api:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── WEB ──────────────────────────────────────────────────────────────
      # Built with placeholder values (__NEXT_PUBLIC_API_URL__ etc).
      # entrypoint.sh replaces them at container startup from .env.web — 
      # so this is now a generic image that works with any server IP/domain.
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-web:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── AI ───────────────────────────────────────────────────────────────
      - name: Build & push AI worker
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ai
          file: ./apps/ai/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-ai:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── WIDGET ───────────────────────────────────────────────────────────
      # Builds the widget JS bundle and packages it with the deploy script.
      # The widget-deploy service in docker-compose runs this image on startup
      # to push InteraOne.js into MinIO automatically.
      - name: Build & push Widget
        uses: docker/build-push-action@v6
        with:
          context: ./apps/widget
          file: ./apps/widget/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-widget:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/InteraOne-widget:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### 🚀 Released \`${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| InteraOne-api | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| InteraOne-web | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| InteraOne-ai  | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| InteraOne-widget | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY

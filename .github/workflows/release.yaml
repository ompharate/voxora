name: Build & Push Docker Images

on:
  push:
    branches: [main]          # build + push :latest on every merge to main
    tags:
      - "v*"                  # build + push versioned tag on: git tag v1.0.0 && git push --tags
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve the image tag:
      #   - workflow_dispatch → user-provided version
      #   - tag push (v1.0.0) → 1.0.0
      #   - branch push (main) → latest
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── API ──────────────────────────────────────────────────────────────
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-api:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── WEB ──────────────────────────────────────────────────────────────
      # Built with __VITE_*__ placeholder values.
      # entrypoint.sh replaces them at container startup from .env.docker
      # so this is a generic image that works with any domain.
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-web:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── AI ───────────────────────────────────────────────────────────────
      - name: Build & push AI worker
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ai
          file: ./apps/ai/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-ai:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── WORKER ───────────────────────────────────────────────────────────
      - name: Build & push Worker
        uses: docker/build-push-action@v6
        with:
          context: ./apps/worker
          file: ./apps/worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-worker:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── WIDGET ───────────────────────────────────────────────────────────
      # Builds the widget JS bundle and packages it with the deploy script.
      # The widget-deploy service in docker-compose runs this image on startup
      # to push InteraOne.js into MinIO automatically.
      - name: Build & push Widget
        uses: docker/build-push-action@v6
        with:
          context: ./apps/widget
          file: ./apps/widget/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-widget:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/interaone-widget:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### 🚀 Released \`${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| interaone-api    | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| interaone-web    | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| interaone-ai     | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| interaone-worker | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| interaone-widget | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
